name: Build Windows release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Clean previous build outputs
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force kojiPDF.build, kojiPDF.dist, installer/output -ErrorAction SilentlyContinue

      - name: Build standalone application with Nuitka
        shell: cmd
        run: build_nuitka.bat

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer\kojiPDF.iss"

      - name: Upload standalone application artifact
        uses: actions/upload-artifact@v4
        with:
          name: kojiPDF-standalone
          path: kojiPDF.dist/**
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: kojiPDF-installer
          path: installer/output/*.exe
          if-no-files-found: error
